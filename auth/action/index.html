<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kombin | Email Verification</title>
    <link href="https://fonts.googleapis.com/css?family=Heebo:400,700|Oxygen:700" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/css/style.css">
    <link rel="stylesheet" href="../../additionalStyles.css">
    <link rel="icon" type="image/png" href="../../dist/images/kombin_logo_elips.png">
    <style>
        :root {
            --action-ink: #121014;
            --action-muted: #625a61;
            --action-line: rgba(197, 29, 94, 0.16);
            --action-pink: #C51D5E;
            --action-green: #179E5E;
            --action-orange: #c96b3c;
        }

        .auth-action-body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 0%, rgba(197, 29, 94, 0.18), transparent 32%),
                linear-gradient(135deg, #fff7fb 0%, #f7edf3 44%, #ffffff 100%);
        }

        .auth-action-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .auth-action-card {
            width: min(100%, 560px);
            display: grid;
            gap: 26px;
            padding: clamp(28px, 5vw, 48px);
            border: 1px solid var(--action-line);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 24px 70px rgba(45, 25, 40, 0.14);
            backdrop-filter: blur(18px);
        }

        .auth-action-brand {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 12px;
            color: var(--action-ink);
            font-family: "Outfit", sans-serif;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
        }

        .auth-action-brand img {
            width: 46px;
            height: 46px;
            border-radius: 50%;
        }

        .auth-action-copy {
            display: grid;
            gap: 14px;
        }

        .auth-action-eyebrow {
            margin: 0;
            color: var(--action-pink);
            font-family: "Outfit", sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .auth-action-title {
            margin: 0;
            color: var(--action-ink);
            font-family: "Outfit", sans-serif;
            font-size: clamp(36px, 8vw, 64px);
            font-weight: 800;
            line-height: 0.98;
            letter-spacing: 0;
        }

        .auth-action-message {
            margin: 0;
            color: var(--action-muted);
            font-size: clamp(16px, 2.5vw, 18px);
            line-height: 1.65;
        }

        .status-visual {
            position: relative;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 2px solid rgba(197, 29, 94, 0.16);
            background: #fff;
        }

        .status-visual::before,
        .status-visual::after,
        .status-visual span {
            position: absolute;
            content: "";
        }

        .status-visual.is-loading {
            border-top-color: var(--action-pink);
            animation: spin 0.9s linear infinite;
        }

        .status-visual.is-loading span {
            inset: 18px;
            border-radius: inherit;
            border: 1px solid rgba(197, 29, 94, 0.18);
        }

        .status-visual.is-success {
            border-color: var(--action-green);
            background: rgba(23, 158, 94, 0.08);
        }

        .status-visual.is-success::after {
            width: 28px;
            height: 14px;
            left: 19px;
            top: 23px;
            border-left: 4px solid var(--action-green);
            border-bottom: 4px solid var(--action-green);
            transform: rotate(-45deg);
        }

        .status-visual.is-error,
        .status-visual.is-unsupported {
            border-color: var(--action-orange);
            background: rgba(201, 107, 60, 0.08);
        }

        .status-visual.is-error::before,
        .status-visual.is-error::after,
        .status-visual.is-unsupported::before,
        .status-visual.is-unsupported::after {
            width: 30px;
            height: 4px;
            left: 17px;
            top: 31px;
            border-radius: 999px;
            background: var(--action-orange);
        }

        .status-visual.is-error::before,
        .status-visual.is-unsupported::before {
            transform: rotate(45deg);
        }

        .status-visual.is-error::after,
        .status-visual.is-unsupported::after {
            transform: rotate(-45deg);
        }

        .auth-action-button[hidden] {
            display: none;
        }

        .auth-action-button {
            width: fit-content;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 560px) {
            .auth-action-shell {
                align-items: stretch;
                padding: 14px;
            }

            .auth-action-card {
                align-content: center;
                min-height: calc(100vh - 28px);
                border-radius: 14px;
            }
        }
    </style>
</head>

<body class="is-boxed has-animations auth-action-body">
<div class="body-wrap boxed-container">
    <main class="auth-action-shell" aria-live="polite">
        <section class="auth-action-card">
            <a class="auth-action-brand" href="../../index.html">
                <img src="../../dist/images/kombin_logo_elips.png" alt="Kombin logo">
                <span>Kombin</span>
            </a>

            <div class="auth-action-copy">
                <p id="state-eyebrow" class="auth-action-eyebrow">Account verification</p>
                <h1 id="state-title" class="auth-action-title">Verifying your email</h1>
                <p id="state-message" class="auth-action-message">
                    Please keep this page open while we confirm your Kombin account.
                </p>
            </div>

            <div id="status-visual" class="status-visual is-loading" aria-hidden="true">
                <span></span>
            </div>

            <a id="open-kombin" class="button button-primary button-wide-mobile button-bordered auth-action-button" href="https://kombin.fit" hidden rel="noopener">
                Open Kombin
            </a>
        </section>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirebaseConfig, hasFirebaseConfig } from "../../firebase-config.js";

    const translations = {
        en: {
            eyebrow: "Account verification",
            loadingTitle: "Verifying your email",
            loadingMessage: "Please keep this page open while we confirm your Kombin account.",
            successTitle: "Email verified",
            successMessage: "Your Kombin account is confirmed. You can return to the beta and continue styling.",
            errorTitle: "Verification link did not work",
            errorMessage: "This link may be invalid, expired, missing its code, or already used. Request a new verification email from Kombin and try again.",
            unsupportedTitle: "Action not supported",
            unsupportedMessage: "This action is not supported on this page.",
            configTitle: "Firebase is not configured",
            configMessage: "Email verification is unavailable until the Firebase browser config is provided for this site.",
            openKombin: "Open Kombin",
        },
        tr: {
            eyebrow: "Hesap doğrulama",
            loadingTitle: "E-postan doğrulanıyor",
            loadingMessage: "Kombin hesabını onaylarken lütfen bu sayfayı açık tut.",
            successTitle: "E-posta doğrulandı",
            successMessage: "Kombin hesabın onaylandı. Betaya dönüp stilini oluşturmaya devam edebilirsin.",
            errorTitle: "Doğrulama bağlantısı çalışmadı",
            errorMessage: "Bu bağlantı geçersiz, süresi dolmuş, kodu eksik ya da daha önce kullanılmış olabilir. Kombin'den yeni bir doğrulama e-postası isteyip tekrar dene.",
            unsupportedTitle: "İşlem desteklenmiyor",
            unsupportedMessage: "This action is not supported on this page.",
            configTitle: "Firebase yapılandırılmadı",
            configMessage: "Bu site için Firebase tarayıcı yapılandırması sağlanana kadar e-posta doğrulama kullanılamaz.",
            openKombin: "Kombin'i Aç",
        },
    };

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const oobCode = params.get("oobCode");
    const apiKey = params.get("apiKey");
    const continueUrl = params.get("continueUrl");
    const lang = params.get("lang");
    const firebaseConfig = getFirebaseConfig(apiKey);
    const locale = String(lang || navigator.language || "en").toLowerCase().startsWith("tr") ? "tr" : "en";
    const t = translations[locale];

    document.documentElement.lang = locale;

    const eyebrow = document.getElementById("state-eyebrow");
    const title = document.getElementById("state-title");
    const message = document.getElementById("state-message");
    const visual = document.getElementById("status-visual");
    const openButton = document.getElementById("open-kombin");

    function setState(state, titleText, messageText) {
        eyebrow.textContent = t.eyebrow;
        title.textContent = titleText;
        message.textContent = messageText;
        visual.className = `status-visual is-${state}`;
        openButton.hidden = state !== "success";
        openButton.textContent = t.openKombin;
    }

    function getContinueUrl(rawUrl) {
        if (!rawUrl) return "https://kombin.fit";

        try {
            const url = new URL(rawUrl);
            const blockedProtocols = new Set(["javascript:", "data:", "vbscript:"]);
            return blockedProtocols.has(url.protocol) ? "https://kombin.fit" : url.href;
        } catch (error) {
            return "https://kombin.fit";
        }
    }

    async function verifyEmailActionCode() {
        if (mode !== "verifyEmail") {
            setState("unsupported", t.unsupportedTitle, t.unsupportedMessage);
            return;
        }

        if (!oobCode) {
            setState("error", t.errorTitle, t.errorMessage);
            return;
        }

        if (!hasFirebaseConfig(firebaseConfig)) {
            setState("error", t.configTitle, t.configMessage);
            return;
        }

        try {
            /*
             * Firebase email action links append mode, oobCode, apiKey,
             * continueUrl, and lang to this custom URL. For mode=verifyEmail,
             * no signed-in user is required: applyActionCode(auth, oobCode)
             * consumes the one-time code and marks that Firebase Auth email as
             * verified. If no deploy-time Firebase config exists, the helper can
             * use the apiKey from Firebase's action link for this one action.
             */
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            await applyActionCode(auth, oobCode);

            openButton.href = getContinueUrl(continueUrl);
            setState("success", t.successTitle, t.successMessage);
        } catch (error) {
            console.error("Firebase email verification failed:", error);
            setState("error", t.errorTitle, t.errorMessage);
        }
    }

    setState("loading", t.loadingTitle, t.loadingMessage);
    verifyEmailActionCode();
</script>
</body>
</html>
